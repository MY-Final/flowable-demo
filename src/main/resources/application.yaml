server:
  port: 8080

spring:
  application:
    name: flowable-demo
  datasource:
    url: jdbc:mysql://192.168.2.14:33306/flowable?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

# Flowable 配置
flowable:
  # 数据库表配置：true=自动创建表（首次），false=不自动创建，update=更新表结构
  database-schema-update: true
  # 关闭REST API（我们自定义Controller）
  rest-api-enabled: false
  # 异步执行器配置
  async-executor:
    activate: true
    core-pool-size: 8
    max-pool-size: 8
  # 历史记录级别：none/activity/audit/full
  history-level: audit
  # ID生成器：strong=UUID风格，simple=自增
  id-generator: strong
  # 关闭Flowable默认的用户缓存
  disable-idm-engine: true

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    org.flowable: debug
    com.my.flowabledemo: debug